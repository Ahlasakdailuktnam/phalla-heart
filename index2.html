<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Love You</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: linear-gradient(to top right, #fff0f5, #ffe4e1);
        font-family: "Comic Sans MS", cursive, sans-serif;
        user-select: none;
      }

      h1 {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 4em;
        color: #ff1493;
        text-shadow: 0 0 20px #ff69b4;
        animation: floatText 4s ease-in-out infinite;
      }

      @keyframes floatText {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-25px);
        }
      }

      .heart {
        position: absolute;
        color: #ff3366;
        font-size: 2rem;
        pointer-events: none;
        animation: floatHeart 2.5s ease-out forwards;
        opacity: 0;
        white-space: nowrap;
      }

      @keyframes floatHeart {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        50% {
          transform: translateY(-60px) scale(1.2);
          opacity: 1;
        }
        100% {
          transform: translateY(-120px) scale(0.8);
          opacity: 0;
        }
      }

      .background-heart {
        position: absolute;
        color: rgba(255, 105, 180, 0.3);
        font-size: 1.5rem;
        animation: bgHeart 8s linear infinite;
      }

      @keyframes bgHeart {
        0% {
          transform: translateY(100vh) scale(0.5) rotate(0deg);
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) scale(1) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>I Love You</h1>

    <script>
      const yourName = "From Bunny 💕"; // ← Change this to your name
      const emojis = ["❤️", "💖", "💘", "💕", "💗", "💞", "💓"];

      // Tap/Click to spawn hearts
      function spawnHeart(x, y) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = ${emojis[Math.floor(Math.random() * emojis.length)]} ${yourName};
        heart.style.left = ${x}px;
        heart.style.top = ${y}px;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2500);
      }

      // Touch or click
      document.addEventListener("click", e => spawnHeart(e.clientX, e.clientY));
      document.addEventListener("touchstart", e => {
        const touch = e.touches[0];
        spawnHeart(touch.clientX, touch.clientY);
      });

      // Floating background hearts
      function createBackgroundHearts() {
        const heart = document.createElement("div");
        heart.className = "background-heart";
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "-5vh";
        heart.style.fontSize = ${Math.random() * 2 + 1}rem;
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 8000);
      }

      setInterval(createBackgroundHearts, 500); // Every 0.5s
    </script>
  </body>
</html>
